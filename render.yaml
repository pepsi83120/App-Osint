services:
  - type: web
    name: osint-studio
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /tmp/osint.db
      - key: SESSION_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: PAYPAL_EMAIL
        sync: false
      - key: PAYPAL_PAYMENT_LINK
        sync: false
